name: 🤖 Daily Price Intelligence Tracker

on:
  schedule:
    # Runs at 00:00 UTC every day (8:00 AM Kuala Lumpur Time)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to click a "Run" button manually on GitHub

jobs:
  scrape_and_report:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: pip install -r requirements.txt

    - name: 🕷️ Execute Price Scraper Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python price_scraper.py

    - name: 💾 Auto-Commit and Push Intel Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "AI Automation Bot"
        git add output/
        git commit -m "📊 Auto-update: Latest competitor pricing intel" || echo "No changes to commit"
        git push
